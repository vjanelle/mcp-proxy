name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Bootstrap tools
        run: make bootstrap

      - name: Lint
        run: make lint

      - name: Tests (Ginkgo parallel + race)
        run: make test

      - name: Coverage (Ginkgo)
        run: make coverage

      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" 'BEGIN { if (total+0 < 80.0) { exit 1 } }'

      - name: Upload coverage profile
        uses: actions/upload-artifact@v5
        with:
          name: coverage.out
          path: coverage.out
          if-no-files-found: error

  build-binaries:
    name: Build Binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          out="dist/mcp-proxy-${GOOS}-${GOARCH}${ext}"
          go build -buildvcs=false -o "$out" ./cmd/mcp-proxy

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: mcp-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mcp-proxy-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
